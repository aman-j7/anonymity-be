events {}

http {
    limit_req_zone $binary_remote_addr zone=create_limit:10m rate=1r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=2r/s;

    limit_req_status 429;

    upstream go_app {
        server go-app:8080;
    }

    server {
        listen 80;

        location = /api/rooms {
            limit_req zone=create_limit burst=2 nodelay;
            proxy_pass http://go_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/rooms/ {
            limit_req zone=api_limit burst=10;
            proxy_pass http://go_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /api/health {
            proxy_pass http://go_app;
        }

        location /ws {
            limit_req zone=ws_limit burst=5;
            proxy_pass http://go_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /static/ {
            proxy_pass http://go_app;
        }

        location = / {
            proxy_pass http://go_app;
        }

        location /api/ {
            limit_req zone=api_limit burst=10;
            proxy_pass http://go_app;
        }
    }
}